    // DOM elements
    const grid = document.getElementById('paketGrid');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const totalSpan = document.getElementById('total-count');
    const visibleSpan = document.getElementById('visible-count');
    const resetBtn = document.getElementById('resetBtn');

    let activeFilter = 'all';
    let searchTerm = '';

    function renderCards() {
        const filtered = paketData.filter(item => {
            // filter kategori
            if (activeFilter !== 'all' && item.category !== activeFilter) return false;
            // search by key
            if (searchTerm.trim() !== '') {
                return item.key.toLowerCase().includes(searchTerm.toLowerCase());
            }
            return true;
        });

        visibleSpan.innerText = filtered.length;
        totalSpan.innerText = paketData.length;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-result">рҹҳ• Tidak ada paket ditemukan untuk "${searchTerm}" atau filter ini.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => `
            <div class="card">
                <div class="card-header">
                    <div class="card-key">${escapeHtml(item.key)}</div>
                    <div class="card-badge">${item.category.toUpperCase()}</div>
                </div>
                <div class="card-content"><pre style="font-family: inherit; margin:0; white-space: pre-wrap;">${escapeHtml(item.response)}</pre></div>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    function handleSearch() {
        searchTerm = searchInput.value;
        renderCards();
    }

    function handleFilter(category) {
        activeFilter = category;
        filterBtns.forEach(btn => {
            if (btn.dataset.filter === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderCards();
    }

    // Event listeners
    searchInput.addEventListener('input', handleSearch);
    filterBtns.forEach(btn => {
        if (btn.id === 'resetBtn') return;
        btn.addEventListener('click', () => handleFilter(btn.dataset.filter));
    });
    resetBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchTerm = '';
        handleFilter('all');
    });

    // initial render
    renderCards();
</script>
